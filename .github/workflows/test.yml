name: tests

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      # Unit tests use fixtures and mock transports only; the one live-API
      # test auto-skips because no ANTHROPIC_API_KEY is provided here.
      - run: uv run pytest
